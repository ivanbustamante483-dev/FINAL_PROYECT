<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniVault | Secure Password Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/icon.png">
</head>
<body>
    <div id="app">
        <!-- Login Overlay -->
        <div id="login-overlay" class="overlay active">
            <div class="glass-card login-card">
                <div class="logo-container">
                    <img src="assets/icon.png" alt="MiniVault Logo" class="logo">
                    <h1 id="login-title">MiniVault</h1>
                </div>
                <p id="login-desc">Enter your Master Password to unlock your vault.</p>
                <div class="input-group">
                    <input type="password" id="master-password" placeholder="Master Password">
                    <input type="password" id="confirm-password" class="hidden" placeholder="Confirm Password">
                    <button id="unlock-btn" class="primary-btn">Unlock Vault</button>
                </div>
                <div id="login-error" class="error-msg"></div>
                <p class="disclaimer">Data is stored locally and encrypted in your browser.</p>
            </div>
        </div>

        <!-- Main Dashboard -->
        <main id="dashboard" class="hidden">
            <header>
                <div class="header-content">
                    <div class="brand">
                        <img src="assets/icon.png" alt="Logo" class="mini-logo">
                        <h2>MiniVault</h2>
                    </div>
                    <div class="actions">
                        <button id="gen-pass-btn" class="secondary-btn">Generate Password</button>
                        <button id="add-entry-btn" class="primary-btn">+ Add New</button>
                        <button id="lock-btn" class="lock-btn">🔒 Lock</button>
                    </div>
                </div>
            </header>

            <section class="content">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search credentials...">
                </div>
                
                <div id="vault-items" class="items-grid">
                    <!-- Items will be injected here -->
                </div>

                <div id="empty-state" class="empty-state hidden">
                    <p>Your vault is empty. Add your first credential!</p>
                </div>
            </section>
        </main>

        <!-- Modals -->
        <div id="entry-modal" class="modal hidden">
            <div class="modal-content glass-card">
                <h3>Add New Credential</h3>
                <div class="form-group">
                    <label for="service">Service</label>
                    <input type="text" id="service" placeholder="e.g. GitHub">
                </div>
                <div class="form-group">
                    <label for="username">Username / Email</label>
                    <input type="text" id="username" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password">
                        <button id="toggle-pass" type="button">👁️</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button id="cancel-btn" class="text-btn">Cancel</button>
                    <button id="save-btn" class="primary-btn">Save Credential</button>
                </div>
            </div>
        </div>

        <div id="gen-modal" class="modal hidden">
            <div class="modal-content glass-card">
                <h3>Password Generator</h3>
                <div class="gen-display">
                    <code id="gen-result">********</code>
                    <button id="copy-btn">Copy</button>
                </div>
                <div class="form-group">
                    <label>Length: <span id="length-val">16</span></label>
                    <input type="range" id="length-slider" min="8" max="32" value="16">
                </div>
                <div class="modal-actions">
                    <button id="close-gen-btn" class="primary-btn">Done</button>
                </div>
            </div>
        </div>

        <div id="toast" class="toast hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
